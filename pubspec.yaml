name: amount_localizer
description: >-
  Locale-aware amount formatter with a native bridge that reads the device's
  true Region setting — the one that drives the numeric keyboard's decimal key.
version: 2.0.1
repository: https://github.com/SriNKast/amount_localizer
issue_tracker: https://github.com/SriNKast/amount_localizer/issues
topics:
  - localization
  - intl
  - currency
  - formatting

environment:
  sdk: ^3.10.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ">=0.19.0 <0.21.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.sri.amount_localizer
        pluginClass: AmountLocalizerPlugin
      ios:
        pluginClass: AmountLocalizerPlugin
